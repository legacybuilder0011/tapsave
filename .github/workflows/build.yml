name: Build TapSave

# Builds the Android APK and the Windows desktop .exe, then publishes both to a
# rolling "latest" GitHub Release.
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up the Android SDK
        uses: android-actions/setup-android@v3
      - name: Make gradlew executable
        run: chmod +x ./gradlew
      - name: Build the debug APK
        run: ./gradlew assembleDebug --no-daemon
      - name: Collect the APK
        run: cp app/build/outputs/apk/debug/app-debug.apk TapSave.apk
      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: TapSave.apk
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install PyInstaller
        run: pip install pyinstaller
      - name: Build the desktop .exe
        run: pyinstaller --onefile --windowed --name TapSave desktop/tapsave_desktop.py
      - uses: actions/upload-artifact@v4
        with:
          name: exe
          path: dist/TapSave.exe
          if-no-files-found: error

  release:
    needs: [ android, windows ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: apk
          path: .
      - uses: actions/download-artifact@v4
        with:
          name: exe
          path: .
      - name: Publish both to a downloadable Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag -R ${{ github.repository }} 2>/dev/null || true
          gh release create latest TapSave.apk TapSave.exe \
            -R ${{ github.repository }} \
            --title "TapSave (latest build)" \
            --notes "**TapSave.apk** — Android app. **TapSave.exe** — Windows desktop app (floating window; double-click to run, no install). Both need the yt-dlp backend in /server running and its address set. You can also just open the backend URL in any browser. For content you own or have permission to download."
