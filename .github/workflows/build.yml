name: Build TapSave APK

# Builds an installable debug APK on every push and publishes it as a
# downloadable GitHub Release.
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the project
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up the Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build the debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename the APK
        run: cp app/build/outputs/apk/debug/app-debug.apk TapSave.apk

      - name: Upload the APK as a build artifact
        uses: actions/upload-artifact@v4
        with:
          name: TapSave-debug-apk
          path: TapSave.apk
          if-no-files-found: error

      - name: Publish the APK to a downloadable Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest TapSave.apk \
            --title "TapSave (latest build)" \
            --notes "Install this APK on Android 10+, allow installing from this source. TapSave needs the yt-dlp backend in /server running and its address set in the app. For content you own or have permission to download."
